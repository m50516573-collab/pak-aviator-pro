<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAK AVIATOR PRO | B9 VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ea0606; --accent: #28a745; --dark: #12131a; --card: #1b1c21; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #app { max-width: 480px; margin: auto; height: 100vh; display: flex; flex-direction: column; background: var(--dark); }
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: #14151b; border-bottom: 1px solid #222; }
        .bal-box { background: #000; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; }
        .arena { height: 40vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at bottom, #1a0505, #000); overflow: hidden; }
        #mVal { font-size: 80px; font-weight: 900; z-index: 10; text-shadow: 0 0 30px rgba(255,0,0,0.5); }
        #plane { position: absolute; width: 110px; z-index: 5; transition: 0.1s linear; }
        .history-bar { height: 35px; background: #0d0e12; display: flex; align-items: center; padding: 5px; gap: 8px; overflow-x: auto; border-bottom: 1px solid #222; }
        .hist-item { font-size: 11px; font-weight: bold; background: #222; padding: 3px 10px; border-radius: 10px; color: #34b4ff; }
        .bet-area { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-grow: 1; background: #000; }
        .control-panel { background: var(--card); border-radius: 15px; padding: 12px; border: 1px solid #2a2b31; display: flex; flex-direction: column; }
        .input-box { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 8px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .input-box input { background: transparent; border: none; color: #fff; width: 50px; text-align: center; font-size: 18px; font-weight: 800; }
        .btn-main { height: 70px; border: none; border-radius: 12px; font-weight: 900; font-size: 20px; color: #fff; cursor: pointer; transition: 0.2s; }
        .btn-bet { background: var(--accent); box-shadow: inset 0 -4px 0 #1e7e34; }
        .btn-cash { background: #d97706; box-shadow: inset 0 -4px 0 #92400e; }
        .btn-wait { background: #4b5563; }
        .auto-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-top: 10px; color: #888; }
        @keyframes crash { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div style="color:var(--primary); font-weight:900; font-size:22px;">PAK AVIATOR</div>
            <div class="bal-box">Rs <span id="userBal">0.00</span></div>
        </div>
        <div class="history-bar" id="hist"></div>
        <div class="arena">
            <div id="status-tag" style="position:absolute; top:20px; font-size:12px; color:#666; font-weight:bold;">WAITING FOR NEXT ROUND</div>
            <div id="mVal">1.00x</div>
            <img src="https://aviator-next.spribegaming.com/aviator-plane.663c6396f905541e.svg" id="plane" style="display:none;">
        </div>
        <div class="bet-area">
            <div class="control-panel">
                <div class="input-box">
                    <button onclick="adj(1,-50)" style="color:red;border:none;background:none;font-size:20px;">-</button>
                    <input type="number" id="amt1" value="100">
                    <button onclick="adj(1,50)" style="color:green;border:none;background:none;font-size:20px;">+</button>
                </div>
                <button id="btn1" onclick="action(1)" class="btn-main btn-bet">BET</button>
                <div class="auto-row"><span>AUTO CASH</span><input type="number" id="auto1" placeholder="2.0" style="width:35px;background:#000;border:1px solid #444;color:#fff;"></div>
            </div>
            <div class="control-panel">
                <div class="input-box">
                    <button onclick="adj(2,-50)" style="color:red;border:none;background:none;font-size:20px;">-</button>
                    <input type="number" id="amt2" value="100">
                    <button onclick="adj(2,50)" style="color:green;border:none;background:none;font-size:20px;">+</button>
                </div>
                <button id="btn2" onclick="action(2)" class="btn-main btn-bet">BET</button>
                <div class="auto-row"><span>AUTO CASH</span><input type="number" id="auto2" placeholder="2.0" style="width:35px;background:#000;border:1px solid #444;color:#fff;"></div>
            </div>
        </div>
    </div>

<script>
    const conf = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
    firebase.initializeApp(conf);
    const db = firebase.database(), auth = firebase.auth();
    let uid, bal = 0, mult = 1.0, flying = false, waiting = true;
    let bets = { 1: {active:false, amt:0, cashed:false}, 2: {active:false, amt:0, cashed:false} };

    auth.onAuthStateChanged(user => {
        if(user) { uid = user.uid; setupUser(); } 
        else { auth.signInAnonymously(); }
    });

    function setupUser() {
        db.ref('users/'+uid).on('value', s => {
            if(!s.exists()) db.ref('users/'+uid).set({balance:5000});
            bal = s.val().balance || 0;
            document.getElementById('userBal').innerText = bal.toFixed(2);
        });
        db.ref('game_state').on('value', snap => {
            const d = snap.val(); if(!d) return;
            mult = d.mult; flying = d.isFlying; waiting = d.isWaiting;
            updateUI(d);
        });
    }

    function updateUI(d) {
        const m = document.getElementById('mVal'), p = document.getElementById('plane'), st = document.getElementById('status-tag');
        if(waiting) {
            m.innerText = "WAITING"; m.style.color = "#fff"; p.style.display = "none";
            st.innerText = "NEXT ROUND IN " + d.timer + "s";
            resetBtns();
        } else if(flying) {
            m.innerText = mult.toFixed(2) + "x"; m.style.color = "#fff"; p.style.display = "block";
            p.style.left = Math.min(10 + (mult * 10), 70) + "%";
            p.style.bottom = Math.min(10 + (mult * 5), 60) + "%";
            st.innerText = "PLANE IS FLYING";
            liveUpdate(); checkAuto();
        } else {
            m.innerText = "FLEW AWAY!"; m.style.color = "#ea0606";
            p.style.animation = "crash 0.4s forwards";
            setTimeout(() => { p.style.display = "none"; p.style.animation = ""; }, 500);
            st.innerText = "CRASHED";
        }
    }

    function action(id) {
        const a = parseFloat(document.getElementById('amt'+id).value);
        if(waiting && !bets[id].active) {
            if(a > bal) return alert("Low Balance");
            db.ref('users/'+uid).update({balance: bal - a});
            bets[id] = {active:true, amt:a, cashed:false};
            const b = document.getElementById('btn'+id);
            b.className = "btn-main btn-wait"; b.innerText = "WAITING...";
        } else if(flying && bets[id].active && !bets[id].cashed) {
            doCash(id);
        }
    }

    function doCash(id) {
        const win = bets[id].amt * mult;
        db.ref('users/'+uid).update({balance: bal + win});
        bets[id].cashed = true; bets[id].active = false;
        const b = document.getElementById('btn'+id);
        b.style.background = "#059669"; b.innerText = "Rs " + win.toFixed(2);
    }

    function checkAuto() {
        [1,2].forEach(i => {
            let v = parseFloat(document.getElementById('auto'+i).value);
            if(v && mult >= v && bets[i].active && !bets[i].cashed) doCash(i);
        });
    }

    function liveUpdate() {
        [1,2].forEach(i => {
            if(bets[i].active && !bets[i].cashed) {
                const b = document.getElementById('btn'+i);
                b.className = "btn-main btn-cash";
                b.innerHTML = `CASH OUT<br><small>Rs ${(bets[i].amt * mult).toFixed(2)}</small>`;
            }
        });
    }

    function resetBtns() {
        [1,2].forEach(i => { if(!bets[i].active) { 
            const b = document.getElementById('btn'+i);
            b.className = "btn-main btn-bet"; b.innerText = "BET"; b.style.background = "";
        }});
    }

    function adj(id, v) { 
        const i = document.getElementById('amt'+id);
        i.value = Math.max(10, parseInt(i.value) + v);
    }
</script>
</body>
</html>
