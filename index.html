<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator VIP - Muhammad Shop</title>
    
    <script>
        // Force Fresh Version - No Cache
        (function() {
            var url = new URL(window.location.href);
            if (!url.searchParams.has('v')) {
                url.searchParams.set('v', Date.now());
                window.location.replace(url.toString());
            }
        })();
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --red: #ea0606; --bg: #12131a; --card: #1e1f26; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; --vip-purple: #9c27b0; }
        body { margin: 0; background: #000; color: white; font-family: 'Roboto', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #app { max-width: 450px; margin: auto; background: var(--bg); min-height: 100vh; position: relative; display: none; }
        
        /* Headers & UI */
        .header { display: flex; justify-content: space-between; padding: 12px 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #333; }
        .bal-box { border: 1.5px solid var(--win); border-radius: 20px; padding: 4px 12px; color: var(--win); font-weight: 800; font-size: 14px; }
        
        /* Game Arena */
        .arena { height: 230px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border-radius: 0 0 20px 20px; }
        #mVal { font-size: 55px; font-weight: 900; z-index: 10; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        #plane { position: absolute; font-size: 45px; bottom: 15%; left: 10%; z-index: 5; display: none; filter: drop-shadow(0 0 10px red); transition: left 0.1s linear, bottom 0.1s linear; }
        
        /* Super Jet Alert */
        #super-label { position: absolute; top: 15px; color: var(--gold); font-weight: 900; font-size: 16px; display: none; animation: flash 0.4s infinite; text-shadow: 0 0 15px orange; z-index: 30; }
        @keyframes flash { 0% {opacity: 1; transform: scale(1);} 50% {opacity: 0.5; transform: scale(1.1);} 100% {opacity: 1; transform: scale(1);} }

        /* Controls */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .bet-box { background: #14151b; padding: 12px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .b-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; color: white; cursor: pointer; background: var(--win); }
        
        /* Overlays */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
        .status-item { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<div id="auth-screen" style="display:flex; height:100vh; align-items:center; justify-content:center; background:#12131a;">
    <div style="text-align:center; background:#1e1f26; padding:30px; border-radius:20px; width:80%;">
        <h2 style="color:var(--red)">AVIATOR LOGIN</h2>
        <input type="email" id="auth-email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0; border-radius:8px;">
        <input type="password" id="auth-pass" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border-radius:8px;">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--red); border:none; color:white; font-weight:bold; border-radius:8px;">LOGIN / SIGNUP</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div style="font-size:10px;"><span id="uGmail">...</span><br><button onclick="toggleTab('profileTab')" style="color:var(--blue); background:none; border:none; padding:0;">PROFILE 👤</button></div>
        <div class="bal-box">Rs <span id="uBal">0.00</span></div>
        <div>
            <button onclick="toggleTab('depTab')" style="background:var(--win); color:white; border:none; padding:5px 10px; border-radius:5px;">DEP</button>
        </div>
    </div>

    <div class="history-bar" id="hBar" style="display:flex; gap:5px; padding:10px; overflow-x:auto;"></div>

    <div class="arena">
        <div id="super-label">🚀 SUPER JET ACTIVE 🚀</div>
        <div id="mVal">WAITING</div>
        <div id="plane">✈️</div>
    </div>

    <div style="padding:10px; background:#1b1c21; display:flex; justify-content:space-between; font-size:12px;">
        <span>ALL BETS</span>
        <span style="color:var(--win)">● <span id="pCount">0</span> Players</span>
    </div>

    <div class="controls-grid">
        <div class="bet-box">
            <input type="number" id="amt1" value="100" style="width:80%; padding:5px; margin-bottom:5px;">
            <button id="btn1" onclick="handleBet(1)" class="b-btn">BET</button>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100" style="width:80%; padding:5px; margin-bottom:5px;">
            <button id="btn2" onclick="handleBet(2)" class="b-btn">BET</button>
        </div>
    </div>

    <div id="depTab" class="overlay">
        <button onclick="toggleTab()" style="float:right; color:red;">Close</button>
        <h3>DEPOSIT JAZZCASH</h3>
        <p>Till ID: 983199695</p>
        <input type="number" id="dAmt" placeholder="Amount" style="width:100%; padding:10px; margin:5px 0;">
        <input type="text" id="dTid" placeholder="TID" style="width:100%; padding:10px; margin:5px 0;">
        <button onclick="submitDep()" class="b-btn">SUBMIT</button>
    </div>

    <div id="profileTab" class="overlay">
        <button onclick="toggleTab()" style="float:right; color:red;">Close</button>
        <h3>MY PROFILE</h3>
        <div id="uStatusList">Loading history...</div>
        <button onclick="auth.signOut()" style="background:red; color:white; width:100%; padding:10px; margin-top:20px; border:none;">LOGOUT</button>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let uid, balance = 0, depositSum = 0, mult = 1.0, isFlying = false, currentPlayers = 0;
let b1 = { active: false, amt: 0, cashed: false }, b2 = { active: false, amt: 0, cashed: false };

auth.onAuthStateChanged(user => {
    if(user) {
        uid = user.uid;
        document.getElementById('uGmail').innerText = user.email;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        db.ref('users/' + uid).on('value', s => {
            if(s.exists()){
                balance = s.val().balance || 0;
                depositSum = s.val().deposit || 0;
                document.getElementById('uBal').innerText = balance.toFixed(2);
            }
        });
        startNextRound();
    }
});

function handleAuth() {
    const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
    auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
}

function startNextRound() {
    mult = 1.0; isFlying = false;
    document.getElementById('mVal').innerText = "WAITING";
    document.getElementById('mVal').style.color = "white";
    document.getElementById('plane').style.display = 'none';
    document.getElementById('super-label').style.display = 'none';
    
    // Timer Players
    currentPlayers = Math.floor(Math.random() * (1500 - 1200) + 1200);
    document.getElementById('pCount').innerText = currentPlayers;

    setTimeout(launchPlane, 5000); // 5 sec wait
}

function launchPlane() {
    isFlying = true;
    document.getElementById('plane').style.display = 'block';
    
    // RNG Logic
    let target = (balance > depositSum && depositSum > 0) ? 1.00 : (Math.random() * 5 + 1).toFixed(2);
    if(Math.random() < 0.1) target = (Math.random() * 50 + 10).toFixed(2); // Rare High

    function engine() {
        if(!isFlying) return;
        
        // Super Jet Speed Up
        let increment = (mult >= 2.0) ? 0.08 : 0.02;
        if(mult >= 2.0) document.getElementById('super-label').style.display = 'block';
        
        mult += increment;
        document.getElementById('mVal').innerText = mult.toFixed(2) + "x";

        // Players Drop tezi se
        if(currentPlayers > 50) {
            currentPlayers -= Math.floor(Math.random() * 20);
            document.getElementById('pCount').innerText = currentPlayers;
        }

        // Move Plane
        document.getElementById('plane').style.left = (10 + (mult * 3)) + "%";
        document.getElementById('plane').style.bottom = (15 + (mult * 2)) + "%";

        if(mult >= target) {
            isFlying = false;
            document.getElementById('mVal').innerText = "FLEW AWAY!";
            document.getElementById('mVal').style.color = "red";
            resetBets();
            setTimeout(startNextRound, 3000);
        } else {
            setTimeout(engine, 100);
        }
    }
    engine();
}

function handleBet(id) {
    let b = (id === 1) ? b1 : b2;
    let amt = parseFloat(document.getElementById('amt'+id).value);
    
    if(!isFlying && !b.active) {
        if(amt > balance) return alert("Low Balance");
        b.active = true; b.amt = amt;
        db.ref('users/'+uid).update({ balance: balance - amt });
        document.getElementById('btn'+id).innerText = "CANCEL";
    } else if(isFlying && b.active && !b.cashed) {
        let win = b.amt * mult;
        b.cashed = true;
        db.ref('users/'+uid).update({ balance: balance + win });
        document.getElementById('btn'+id).innerText = "WIN!";
    }
}

function resetBets() {
    b1 = { active: false, amt: 0, cashed: false };
    b2 = { active: false, amt: 0, cashed: false };
    document.getElementById('btn1').innerText = "BET";
    document.getElementById('btn2').innerText = "BET";
}

function toggleTab(id) {
    document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
    if(id) {
        document.getElementById(id).style.display = 'block';
        if(id === 'profileTab') loadHistory();
    }
}

function loadHistory() {
    db.ref('requests').orderByChild('uid').equalTo(uid).on('value', s => {
        let html = "";
        s.forEach(child => {
            let d = child.val();
            html += `<div class="status-item"><b>${d.type}</b>: Rs ${d.amount} <br> Status: ${d.status}</div>`;
        });
        document.getElementById('uStatusList').innerHTML = html || "No history.";
    });
}

function submitDep() {
    let a = document.getElementById('dAmt').value, t = document.getElementById('dTid').value;
    if(a && t) {
        db.ref('requests').push({ uid, amount: a, tid: t, type: 'deposit', status: 'pending' });
        alert("Submitted!"); toggleTab();
    }
}
</script>
</body>
</html>
