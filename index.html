<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator VIP - Muhammad Shop</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --red: #ea0606; --bg: #12131a; --card: #1e1f26; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; --vip-purple: #9c27b0; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        #app { max-width: 450px; margin: auto; background: var(--bg); min-height: 100vh; display: none; position: relative; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 85%; text-align: center; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .auth-input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #000; border: 1px solid #444; color: #fff; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--red); border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }
        .auth-toggle { font-size: 12px; color: #888; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        /* VIP UI */
        .header { display: flex; justify-content: space-between; padding: 12px 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #333; }
        .u-info { font-size: 10px; color: var(--blue); }
        .bal-box { border: 1.5px solid var(--win); border-radius: 20px; padding: 4px 12px; color: var(--win); font-weight: 800; font-size: 14px; }
        
        .history-bar { display: flex; gap: 6px; padding: 10px 8px; background: #050505; overflow-x: auto; }
        .h-tag { padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 900; background: #222; border: 1px solid #444; }
        .h-blue { color: var(--blue); } .h-purple { color: var(--vip-purple); } .h-gold { color: var(--gold); }

        .arena { height: 230px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #mVal { font-size: 55px; font-weight: 900; z-index: 10; }
        #plane { position: absolute; font-size: 45px; bottom: 15%; left: 10%; z-index: 5; display: none; }
        #tBox { position: absolute; background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 50px; border: 2px solid var(--win); color: var(--win); display: none; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .bet-box { background: #14151b; padding: 12px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .b-input { width: 90%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        .b-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 900; color: white; background: var(--win); cursor: pointer; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
        .close-btn { float: right; font-size: 30px; color: var(--red); cursor: pointer; }
        .winners-list { background: #0a0a0a; padding: 10px; height: 200px; overflow-y: auto; font-size: 11px; }
        .win-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; padding: 5px 0; border-bottom: 1px solid #1a1a1a; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title" style="color:var(--red);">AVIATOR LOGIN</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
        <button id="auth-main-btn" onclick="handleAuth()" class="auth-btn">LOGIN</button>
        <p id="auth-toggle-text" class="auth-toggle" onclick="toggleAuthMode()">No account? Create one</p>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="u-info"><span id="uGmail">...</span></div>
        <div class="bal-box">Rs <span id="uBal">0.00</span></div>
        <div class="nav-btns">
            <button onclick="toggleTab('depTab')" style="background:var(--win); border:none; color:white; padding:5px 10px; border-radius:5px;">DEP</button>
        </div>
    </div>

    <div class="history-bar" id="hBar"></div>

    <div class="arena">
        <div id="tBox">Next Round: 7s</div>
        <div id="mVal">WAITING</div>
        <div id="plane">✈️</div>
    </div>

    <div class="controls-grid">
        <div class="bet-box">
            <input type="number" id="amt1" value="100" class="b-input">
            <button id="btn1" onclick="handleBet(1)" class="b-btn">BET</button>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100" class="b-input">
            <button id="btn2" onclick="handleBet(2)" class="b-btn">BET</button>
        </div>
    </div>

    <div class="winners-list" id="winRows"></div>

    <div id="depTab" class="overlay">
        <span class="close-btn" onclick="toggleTab()">×</span>
        <h3 style="color:var(--gold);">DEPOSIT JAZZCASH</h3>
        <p>Till ID: 983199695</p>
        <input type="number" id="dAmt" placeholder="Amount" class="auth-input">
        <input type="text" id="dTid" placeholder="TID" class="auth-input">
        <button onclick="submitDep()" class="auth-btn">SUBMIT</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", 
        databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let uid, balance = 0, isLoginMode = true;
    let mult = 1.0, isFlying = false, isWaiting = true;
    let b1 = { active: false, amt: 0, cashed: false };
    let b2 = { active: false, amt: 0, cashed: false };

    // Auth Logic
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "AVIATOR LOGIN" : "AVIATOR SIGNUP";
        document.getElementById('auth-main-btn').innerText = isLoginMode ? "LOGIN" : "SIGNUP";
    }

    function handleAuth() {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        if(!e || !p) return alert("Fill data");

        if(isLoginMode) {
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        } else {
            auth.createUserWithEmailAndPassword(e, p).then(res => {
                db.ref('users/' + res.user.uid).set({ email: e, balance: 100 });
            }).catch(err => alert(err.message));
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            uid = user.uid;
            document.getElementById('uGmail').innerText = user.email;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            db.ref('users/' + uid).on('value', s => {
                balance = s.val()?.balance || 0;
                document.getElementById('uBal').innerText = balance.toFixed(2);
            });
            start7sTimer();
            startFakeWinners();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    // Game Logic
    function start7sTimer() {
        let t = 7; isWaiting = true; isFlying = false;
        document.getElementById('tBox').style.display = 'block';
        document.getElementById('plane').style.display = 'none';
        document.getElementById('mVal').innerText = "WAITING";
        
        let timer = setInterval(() => {
            document.getElementById('tBox').innerText = `Next Round: ${t}s`;
            if(t <= 0) { clearInterval(timer); document.getElementById('tBox').style.display = 'none'; launchPlane(); }
            t--;
        }, 1000);
    }

    function launchPlane() {
        isWaiting = false; isFlying = true; mult = 1.0;
        document.getElementById('plane').style.display = 'block';
        let crashPoint = (Math.random() * 3 + 1).toFixed(2);

        function engine() {
            if(!isFlying) return;
            mult += 0.01;
            document.getElementById('mVal').innerText = mult.toFixed(2) + "x";
            
            [1, 2].forEach(id => {
                let b = (id === 1) ? b1 : b2;
                if(b.active && !b.cashed) {
                    document.getElementById('btn'+id).innerText = "CASH OUT\n" + (b.amt * mult).toFixed(2);
                }
            });

            if(mult >= crashPoint) crash();
            else setTimeout(engine, 100);
        }
        engine();
    }

    function crash() {
        isFlying = false;
        document.getElementById('mVal').innerText = "FLEW AWAY!";
        addHistory(mult.toFixed(2));
        [1, 2].forEach(id => {
            let b = (id === 1) ? b1 : b2; b.active = false; b.cashed = false;
            document.getElementById('btn'+id).innerText = "BET";
            document.getElementById('btn'+id).style.background = "#28a745";
        });
        setTimeout(start7sTimer, 3000);
    }

    function handleBet(id) {
        let b = (id === 1) ? b1 : b2;
        let amt = parseFloat(document.getElementById('amt'+id).value);
        let btn = document.getElementById('btn'+id);

        if(isWaiting && !b.active) {
            if(amt > balance) return alert("Low Bal");
            db.ref('users/'+uid).update({ balance: balance - amt });
            b.active = true; b.amt = amt; btn.innerText = "CANCEL"; btn.style.background = "red";
        } else if(isFlying && b.active && !b.cashed) {
            let win = b.amt * mult;
            db.ref('users/'+uid).update({ balance: balance + win });
            b.cashed = true; btn.innerText = "WON!"; btn.style.background = "gold";
        }
    }

    function addHistory(val) {
        let tag = document.createElement('div');
        tag.className = 'h-tag ' + (val > 2 ? 'h-purple' : 'h-blue');
        tag.innerText = val + 'x';
        document.getElementById('hBar').prepend(tag);
    }

    function startFakeWinners() {
        setInterval(() => {
            if(isFlying) {
                let row = document.createElement('div'); row.className = 'win-row';
                row.innerHTML = `<span>User...</span><span>Rs 100</span><span style="color:green">${(Math.random()*mult).toFixed(2)}x</span>`;
                document.getElementById('winRows').prepend(row);
            }
        }, 2000);
    }

    function toggleTab(id) {
        document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
        if(id) document.getElementById(id).style.display = 'block';
    }

    function submitDep() {
        let a = document.getElementById('dAmt').value; let t = document.getElementById('dTid').value;
        if(a && t) { db.ref('requests').push({ uid, amt: a, tid: t, type: 'Dep' }); alert("Sent!"); toggleTab(); }
    }
</script>
</body>
</html>
