<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Pro - Muhammad Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ea0606; --bg: #12131a; --card: #1e1f26; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        #app { max-width: 450px; margin: auto; background: var(--bg); min-height: 100vh; position: relative; display: none; }
        
        .header { display: flex; justify-content: space-between; padding: 12px 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #333; gap: 8px; }
        .u-info { font-size: 10px; color: var(--blue); flex: 1; min-width: 80px; }
        .bal-box { border: 1.5px solid var(--win); border-radius: 20px; padding: 4px 10px; color: var(--win); font-weight: 800; font-size: 13px; background: rgba(0,0,0,0.3); text-align: center; min-width: 85px; }
        .nav-btns { display: flex; gap: 6px; }
        .nav-btns button { padding: 8px 10px; border-radius: 6px; border: none; font-size: 10px; font-weight: bold; color: white; cursor: pointer; }

        .history-bar { display: flex; gap: 5px; padding: 8px; background: #050505; overflow-x: auto; height: 35px; }
        .h-tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; background: #222; border: 1px solid #444; height: fit-content; }
        
        .arena { height: 220px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #mVal { font-size: 50px; font-weight: 900; z-index: 10; }
        #plane { position: absolute; font-size: 45px; bottom: 15%; left: 10%; z-index: 5; display: none; filter: drop-shadow(0 0 10px red); transition: all 0.1s linear; }
        #tBox { position: absolute; background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 50px; border: 2px solid var(--win); color: var(--win); font-weight: bold; z-index: 20; display: none; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: var(--card); }
        .bet-box { background: #14151b; padding: 10px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .b-input { width: 90%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 8px; text-align: center; margin-bottom: 5px; font-size: 14px; }
        .b-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; color: white; cursor: pointer; background: var(--win); }
        .auto-label { font-size: 10px; color: #888; display: block; margin-top: 5px; }

        .live-stats { background: #1b1c21; padding: 5px 15px; display: flex; justify-content: space-between; font-size: 11px; }
        .winners-list { background: #0a0a0a; padding: 10px; min-height: 200px; font-size: 11px; height: 200px; overflow-y: auto; }
        .win-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        .close-btn { float: right; font-size: 24px; cursor: pointer; color: var(--red); }
        .inst-box { background:#111; padding:15px; border-radius:10px; font-size:12px; border-left:4px solid var(--gold); margin-bottom:15px; line-height:1.5; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="width:80%; text-align:center;">
        <h2 style="color:var(--red)">AVIATOR LOGIN</h2>
        <input type="email" id="l-email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; background:#000; border:1px solid #444; color:#fff;">
        <input type="password" id="l-pass" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; background:#000; border:1px solid #444; color:#fff;">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--red); border:none; border-radius:10px; color:#fff; font-weight:bold;">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="u-info"><span id="uGmail">...</span><br><button onclick="toggleTab('profileTab')" style="background:none; border:none; color:var(--blue); font-size:10px; padding:0; cursor:pointer;">MY PROFILE 👤</button></div>
        <div class="bal-box">Rs <span id="uBal">0.00</span></div>
        <div class="nav-btns">
            <button onclick="toggleTab('depTab')" style="background:var(--win);">DEPOSIT</button>
            <button onclick="toggleTab('witTab')" style="background:var(--blue);">WITHDRAW</button>
        </div>
    </div>

    <div class="history-bar" id="hBar"></div>
    <div class="arena">
        <div id="tBox">Next Round: 7s</div>
        <div id="mVal">WAITING</div>
        <div id="plane">✈️</div>
    </div>

    <div class="live-stats"><span>LIVE PLAYERS</span><span style="color:var(--win); font-weight:bold;">● <span id="pCount">1042</span></span></div>

    <div class="controls-grid">
        <div class="bet-box">
            <input type="number" id="amt1" value="100" class="b-input">
            <input type="number" id="autoX1" placeholder="Auto Cash (e.g 2.0)" class="b-input">
            <button id="btn1" onclick="handleBet(1)" class="b-btn">BET</button>
            <label class="auto-label"><input type="checkbox" id="auto1"> Auto Bet</label>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100" class="b-input">
            <input type="number" id="autoX2" placeholder="Auto Cash (e.g 2.0)" class="b-input">
            <button id="btn2" onclick="handleBet(2)" class="b-btn">BET</button>
            <label class="auto-label"><input type="checkbox" id="auto2"> Auto Bet</label>
        </div>
    </div>
    <div class="winners-list" id="winRows"></div>

    <div id="depTab" class="overlay">
        <span class="close-btn" onclick="toggleTab()">×</span>
        <h3 style="color:var(--gold); text-align:center;">DEPOSIT (JAZZCASH)</h3>
        <div class="inst-box"><b>Till ID: 983199695</b></div>
        <input type="number" id="dAmt" placeholder="Amount" class="b-input" style="width:100%;">
        <input type="text" id="dTid" placeholder="TID" class="b-input" style="width:100%;">
        <button onclick="submitDep()" class="b-btn" style="width:100%">SUBMIT</button>
    </div>

    <div id="witTab" class="overlay">
        <span class="close-btn" onclick="toggleTab()">×</span>
        <h3 style="color:var(--blue); text-align:center;">WITHDRAW</h3>
        <input type="number" id="wAmt" placeholder="Amount" class="b-input" style="width:100%;">
        <input type="text" id="wNum" placeholder="Account Number" class="b-input" style="width:100%;">
        <button onclick="submitWit()" class="b-btn" style="width:100%; background:var(--blue)">SUBMIT</button>
    </div>

    <div id="profileTab" class="overlay">
        <span class="close-btn" onclick="toggleTab()">×</span>
        <h3>MY PROFILE</h3>
        <div id="profData"></div>
        <div id="uHistory"></div>
    </div>
</div>

<script>
const conf = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const auth = firebase.auth(), db = firebase.database();

let uid, userEmail, balance = 0, wager = 0, mult = 1.0, isFlying = false, isWaiting = true, currentPlayers = 1042;
let b1 = { active: false, amt: 0, cashed: false }, b2 = { active: false, amt: 0, cashed: false };

function toggleTab(id) { document.querySelectorAll('.overlay').forEach(t => t.style.display = 'none'); if(id) document.getElementById(id).style.display = 'block'; }

function login() {
    const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}

auth.onAuthStateChanged(user => {
    if(user) {
        uid = user.uid; userEmail = user.email;
        document.getElementById('uGmail').innerText = userEmail;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        db.ref('users/' + uid).on('value', s => { 
            if(!s.exists()) db.ref('users/'+uid).set({email: userEmail, balance: 100, wager: 0});
            balance = s.val().balance || 0; wager = s.val().wager || 0;
            document.getElementById('uBal').innerText = balance.toFixed(2);
            document.getElementById('profData').innerHTML = `Email: ${userEmail}<br>Wager: ${wager}/5000`;
        });
        start7sTimer();
        startFakeWinners();
    }
});

function start7sTimer() {
    let t = 7; isWaiting = true; isFlying = false;
    currentPlayers = Math.floor(Math.random() * (1200 - 900) + 900);
    document.getElementById('pCount').innerText = currentPlayers;
    document.getElementById('tBox').style.display = 'block';
    document.getElementById('plane').style.display = 'none';
    document.getElementById('mVal').innerText = "WAITING";
    document.getElementById('mVal').style.color = "white";

    if(document.getElementById('auto1').checked) autoPlace(1);
    if(document.getElementById('auto2').checked) autoPlace(2);

    let itv = setInterval(() => {
        document.getElementById('tBox').innerText = `Next Round: ${t}s`;
        t--;
        if(t < 0) { clearInterval(itv); document.getElementById('tBox').style.display = 'none'; launchPlane(); }
    }, 1000);
}

function autoPlace(id) {
    const amt = parseFloat(document.getElementById('amt' + id).value);
    if(amt <= balance && isWaiting) {
        let b = id === 1 ? b1 : b2;
        db.ref('users/'+uid).update({balance: balance - amt, wager: wager + amt});
        b.active = true; b.amt = amt; b.cashed = false;
        document.getElementById('btn' + id).innerText = "CANCEL";
        document.getElementById('btn' + id).style.background = "#991b1b";
    }
}

function launchPlane() {
    isWaiting = false; isFlying = true; mult = 1.0;
    document.getElementById('plane').style.display = 'block';
    [1, 2].forEach(id => {
        let b = id === 1 ? b1 : b2;
        if(b.active) { document.getElementById('btn' + id).innerText = "CASH OUT"; document.getElementById('btn' + id).style.background = "orange"; }
    });

    const loop = setInterval(() => {
        if(!isFlying) { clearInterval(loop); return; }
        mult += 0.01;
        document.getElementById('mVal').innerText = mult.toFixed(2) + "x";
        document.getElementById('plane').style.left = (10 + (mult * 2.5)) + "%";
        document.getElementById('plane').style.bottom = (15 + (mult * 2)) + "%";
        
        // Players count decreasing
        if(currentPlayers > 100 && Math.random() < 0.3) {
            currentPlayers -= Math.floor(Math.random() * 5);
            document.getElementById('pCount').innerText = currentPlayers;
        }

        // Auto Cash-out Logic
        [1, 2].forEach(id => {
            let b = id === 1 ? b1 : b2;
            let targetX = parseFloat(document.getElementById('autoX' + id).value);
            if(b.active && !b.cashed && targetX > 0 && mult >= targetX) handleBet(id);
        });

        if(Math.random() < 0.013) crash();
    }, 100);
}

function crash() {
    isFlying = false;
    document.getElementById('mVal').innerText = "FLEW AWAY!";
    document.getElementById('mVal').style.color = "red";
    document.getElementById('plane').style.display = 'none';
    const tag = document.createElement('div');
    tag.className = 'h-tag'; tag.innerText = mult.toFixed(2) + 'x';
    document.getElementById('hBar').prepend(tag);
    [1, 2].forEach(id => {
        let b = id === 1 ? b1 : b2;
        b.active = false; b.cashed = false;
        document.getElementById('btn' + id).innerText = "BET";
        document.getElementById('btn' + id).style.background = "#28a745";
    });
    setTimeout(start7sTimer, 3000);
}

function handleBet(id) {
    let b = id === 1 ? b1 : b2;
    const btn = document.getElementById('btn' + id);
    const amt = parseFloat(document.getElementById('amt' + id).value);
    if(isWaiting && !b.active) {
        if(amt > balance) return alert("Low Balance");
        db.ref('users/'+uid).update({balance: balance - amt, wager: wager + amt});
        b.active = true; b.amt = amt; b.cashed = false;
        btn.innerText = "CANCEL"; btn.style.background = "#991b1b";
    } else if(isFlying && b.active && !b.cashed) {
        let win = b.amt * mult;
        db.ref('users/'+uid).update({balance: balance + win});
        b.cashed = true;
        btn.innerText = "WON Rs " + win.toFixed(0);
        btn.style.background = "#155724";
        addWinRow(userEmail.split('@')[0], b.amt, mult.toFixed(2));
    }
}

function addWinRow(u, b, x) {
    const row = document.createElement('div');
    row.className = 'win-row';
    row.innerHTML = `<span>${u}***</span><span>Rs ${b}</span><span style="color:var(--win)">${x}x</span>`;
    const list = document.getElementById('winRows');
    list.prepend(row);
    if(list.children.length > 15) list.lastChild.remove();
}

function startFakeWinners() {
    const names = ["ali","khan","user","player","mian","pro","boss","lucky","win","star"];
    setInterval(() => {
        if(isFlying && Math.random() < 0.4) {
            let n = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99);
            let a = Math.floor(Math.random()*500) + 100;
            let x = (Math.random()*(mult - 1.01) + 1.01).toFixed(2);
            addWinRow(n, a, x);
        }
    }, 2000);
}

function submitDep() {
    const a = document.getElementById('dAmt').value, t = document.getElementById('dTid').value;
    if(!a || !t) return alert("Error");
    db.ref('requests').push({uid, email: userEmail, amount: a, tid: t, type: 'deposit', status: 'pending'});
    alert("Sent!"); toggleTab();
}

function submitWit() {
    const a = document.getElementById('wAmt').value, n = document.getElementById('wNum').value;
    if(a < 500 || wager < 5000 || a > balance) return alert("Wait! Check Wager or Balance");
    db.ref('requests').push({uid, email: userEmail, amount: a, number: n, type: 'withdraw', status: 'pending'});
    db.ref('users/'+uid).update({balance: balance - a});
    alert("Sent!"); toggleTab();
}
</script>
</body>
</html>
