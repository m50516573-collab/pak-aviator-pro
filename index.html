<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator VIP - Muhammad Shop</title>
    
    <script>
        (function() {
            var url = new URL(window.location.href);
            if (!url.searchParams.has('v')) {
                url.searchParams.set('v', Date.now());
                window.location.replace(url.toString());
            }
        })();
        window.onerror = function() { return true; };
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --red: #ea0606; --bg: #12131a; --card: #1e1f26; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; --vip-purple: #9c27b0; }
        body { margin: 0; background: #000; color: white; font-family: 'Roboto', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #app { max-width: 450px; margin: auto; background: var(--bg); min-height: 100vh; position: relative; display: none; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 85%; text-align: center; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .auth-input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #000; border: 1px solid #444; color: #fff; font-size: 14px; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--red); border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .header { display: flex; justify-content: space-between; padding: 12px 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #333; }
        .u-info { font-size: 10px; color: var(--blue); }
        .bal-box { border: 1.5px solid var(--win); border-radius: 20px; padding: 4px 12px; color: var(--win); font-weight: 800; font-size: 14px; }
        .history-bar { display: flex; gap: 6px; padding: 10px 8px; background: #050505; overflow-x: auto; min-height: 25px; }
        .h-tag { padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 900; background: #222; border: 1px solid #444; }
        .h-blue { color: var(--blue); border-color: var(--blue); }
        .h-purple { color: var(--vip-purple); border-color: var(--vip-purple); }
        .h-gold { color: var(--gold); border-color: var(--gold); }
        .arena { height: 230px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #mVal { font-size: 55px; font-weight: 900; z-index: 10; }
        #plane { position: absolute; font-size: 45px; bottom: 15%; left: 10%; z-index: 5; display: none; }
        #tBox { position: absolute; background: rgba(0,0,0,0.85); padding: 12px 25px; border-radius: 50px; border: 2px solid var(--win); color: var(--win); z-index: 20; display: none; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .bet-box { background: #14151b; padding: 12px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .b-input { width: 90%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        .b-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; color: white; background: var(--win); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        .status-item { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #444; font-size: 12px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title" style="color:var(--red);">AVIATOR LOGIN</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
        <button onclick="handleAuth()" class="auth-btn">LOGIN</button>
        <p style="font-size:12px; color:#888; cursor:pointer;" onclick="toggleAuthMode()">Toggle Login/Signup</p>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="u-info"><span id="uGmail">...</span><br><span onclick="toggleTab('profileTab')" style="cursor:pointer">PROFILE 👤</span></div>
        <div class="bal-box">Rs <span id="uBal">0.00</span></div>
        <div>
            <button onclick="toggleTab('depTab')" style="background:var(--win); color:white; border:none; padding:5px 10px; border-radius:5px;">DEP</button>
            <button onclick="toggleTab('witTab')" style="background:var(--blue); color:white; border:none; padding:5px 10px; border-radius:5px;">WIT</button>
        </div>
    </div>

    <div class="history-bar" id="hBar"></div>

    <div class="arena">
        <div id="tBox">Next Round: 7s</div>
        <div id="mVal">WAITING</div>
        <div id="plane">✈️</div>
    </div>

    <div style="padding:5px 15px; font-size:12px; display:flex; justify-content:space-between;">
        <span>ALL BETS</span>
        <span style="color:var(--win)">● <span id="pCount">0</span></span>
    </div>

    <div class="controls-grid">
        <div class="bet-box">
            <input type="number" id="amt1" value="100" class="b-input">
            <button id="btn1" onclick="handleBet(1)" class="b-btn">BET</button>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100" class="b-input">
            <button id="btn2" onclick="handleBet(2)" class="b-btn">BET</button>
        </div>
    </div>

    <div id="depTab" class="overlay">
        <span style="float:right; cursor:pointer" onclick="toggleTab()">× Close</span>
        <h3>DEPOSIT</h3>
        <input type="number" id="dAmt" placeholder="Amount" class="b-input" style="width:100%"><br>
        <input type="text" id="dTid" placeholder="TID" class="b-input" style="width:100%"><br>
        <button onclick="submitDep()" class="b-btn">SUBMIT</button>
    </div>

    <div id="witTab" class="overlay">
        <span style="float:right; cursor:pointer" onclick="toggleTab()">× Close</span>
        <h3>WITHDRAW</h3>
        <input type="number" id="wAmt" placeholder="Amount" class="b-input" style="width:100%"><br>
        <input type="text" id="wNum" placeholder="Number" class="b-input" style="width:100%"><br>
        <button onclick="submitWit()" class="b-btn" style="background:var(--blue)">WITHDRAW</button>
    </div>

    <div id="profileTab" class="overlay">
        <span style="float:right; cursor:pointer" onclick="toggleTab()">× Close</span>
        <h3>HISTORY</h3>
        <div id="uStatusList">Loading...</div>
        <button onclick="auth.signOut()" class="auth-btn">LOGOUT</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let uid, balance = 0, wager = 0, depBal = 0, mult = 1.0, isFlying = false, isWaiting = true;
    let b1 = { active: false, amt: 0, cashed: false }, b2 = { active: false, amt: 0, cashed: false };
    let isLoginMode = true, crashPoint = 1.10;

    function toggleAuthMode() { isLoginMode = !isLoginMode; document.getElementById('auth-title').innerText = isLoginMode ? "LOGIN" : "SIGNUP"; }

    function handleAuth() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(isLoginMode) auth.signInWithEmailAndPassword(e, p).catch(a => alert(a.message));
        else auth.createUserWithEmailAndPassword(e, p).then(r => db.ref('users/'+r.user.uid).set({email:e, balance:100, wager:0, depositBal:100}));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            uid = user.uid; document.getElementById('uGmail').innerText = user.email;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            db.ref('users/'+uid).on('value', s => {
                if(s.exists()) {
                    balance = s.val().balance; wager = s.val().wager; depBal = s.val().depositBal;
                    document.getElementById('uBal').innerText = balance.toFixed(2);
                }
            });
            startTimer();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    function getCrashPoint() {
        // High Bet Security: If any bet > 499, crash early
        if ((b1.active && b1.amt >= 500) || (b2.active && b2.amt >= 500)) return (Math.random() * 0.1 + 1.01).toFixed(2);
        // Balance Security: If profit > 2x deposit, crash early
        if (balance >= (depBal * 2)) return 1.00;
        // Normal random sequence
        let r = Math.random();
        if (r < 0.4) return (Math.random() * 0.2 + 1.1).toFixed(2);
        if (r < 0.8) return (Math.random() * 2 + 1.5).toFixed(2);
        return (Math.random() * 20 + 5).toFixed(2);
    }

    function startTimer() {
        let t = 7; isWaiting = true; isFlying = false;
        document.getElementById('tBox').style.display = 'block';
        document.getElementById('plane').style.display = 'none';
        document.getElementById('mVal').innerText = "WAITING";
        document.getElementById('mVal').style.color = "white";

        let pc = 0, target = Math.floor(Math.random()*300 + 1200);
        let pi = setInterval(() => { 
            if(pc < target) { pc += 50; document.getElementById('pCount').innerText = pc; } 
            else clearInterval(pi);
        }, 100);

        let ti = setInterval(() => {
            document.getElementById('tBox').innerText = `Next Round: ${t}s`;
            if(t <= 0) { clearInterval(ti); document.getElementById('tBox').style.display='none'; crashPoint = getCrashPoint(); startFlight(); }
            t--;
        }, 1000);
    }

    function startFlight() {
        isWaiting = false; isFlying = true; mult = 1.0;
        document.getElementById('plane').style.display = 'block';
        
        function tick() {
            if(!isFlying) return;
            mult += (mult < 2) ? 0.01 : 0.05;
            document.getElementById('mVal').innerText = mult.toFixed(2) + "x";
            document.getElementById('plane').style.left = (10 + (mult * 2)) + "%";

            [1,2].forEach(id => {
                let b = (id==1)?b1:b2;
                if(b.active && !b.cashed) document.getElementById('btn'+id).innerText = "CASH Rs" + (b.amt*mult).toFixed(1);
            });

            if(mult >= crashPoint) {
                isFlying = false;
                document.getElementById('mVal').innerText = "FLEW AWAY!";
                document.getElementById('mVal').style.color = "red";
                document.getElementById('plane').style.display = 'none';
                [1,2].forEach(id => { 
                    let b = (id==1)?b1:b2; b.active = false; b.cashed = false;
                    document.getElementById('btn'+id).innerText = "BET";
                    document.getElementById('btn'+id).style.background = "var(--win)";
                });
                addHist(crashPoint);
                setTimeout(startTimer, 3000);
            } else { setTimeout(tick, 100); }
        }
        tick();
    }

    function handleBet(id) {
        let b = (id==1)?b1:b2, btn = document.getElementById('btn'+id), amt = parseFloat(document.getElementById('amt'+id).value);
        if(isWaiting && !b.active) {
            if(amt > balance || amt < 10) return alert("Low Bal");
            db.ref('users/'+uid).update({balance: balance - amt, wager: wager + amt});
            b.active = true; b.amt = amt; btn.innerText = "CANCEL"; btn.style.background = "var(--red)";
        } else if(isFlying && b.active && !b.cashed) {
            db.ref('users/'+uid).update({balance: balance + (b.amt * mult)});
            b.cashed = true; btn.innerText = "WIN!"; btn.style.background = "#155724";
        }
    }

    function addHist(v) {
        let t = document.createElement('div'); t.className = 'h-tag';
        if(v >= 10) t.classList.add('h-gold'); else if(v >= 2) t.classList.add('h-purple'); else t.classList.add('h-blue');
        t.innerText = v + 'x'; document.getElementById('hBar').prepend(t);
    }

    function toggleTab(id) { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); if(id) document.getElementById(id).style.display='block'; if(id=='profileTab') loadHist(); }

    function submitDep() {
        let a = document.getElementById('dAmt').value, t = document.getElementById('dTid').value;
        if(a && t) { db.ref('requests').push({uid, amt:a, tid:t, type:'Dep', status:'pending', date:new Date().toLocaleString()}); alert("Sent"); toggleTab(); }
    }

    function submitWit() {
        let a = document.getElementById('wAmt').value, n = document.getElementById('wNum').value;
        if(a >= 500 && wager >= 5000 && balance >= a) {
            db.ref('requests').push({uid, amt:a, num:n, type:'Wit', status:'pending', date:new Date().toLocaleString()});
            db.ref('users/'+uid).update({balance: balance - a}); alert("Sent"); toggleTab();
        } else alert("Check Wager/Bal");
    }

    function loadHist() {
        db.ref('requests').orderByChild('uid').equalTo(uid).on('value', s => {
            let h = ""; s.forEach(c => {
                let d = c.val(), col = d.status=='approved'?'#28a745':'orange';
                h += `<div class="status-item" style="border-left-color:${col}"><b>${d.type}</b>: Rs ${d.amt} - <span style="color:${col}">${d.status}</span></div>`;
            });
            document.getElementById('uStatusList').innerHTML = h || "No history";
        });
    }
</script>
</body>
</html>
