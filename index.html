<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Pro - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* CSS Settings for Login & Game */
        :root { --red: #e11d48; --bg: #0f1016; --card: #1b1c21; --win: #28a745; --blue: #34b4ff; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        
        /* Login Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; text-align: center; }
        .auth-box h2 { color: var(--red); margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--red); border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-link { font-size: 12px; color: var(--blue); cursor: pointer; display: block; margin-top: 15px; }

        /* Game UI (Same as before) */
        #game-screen { display: none; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #16171d; border-bottom: 1px solid #333; align-items: center; }
        .bal-box { border: 2px solid var(--win); border-radius: 20px; padding: 4px 12px; color: var(--win); font-weight: bold; }
        .arena { height: 260px; background: #000; position: relative; margin: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        #mVal { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-weight: 900; z-index: 10; }
        .main-btn { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; font-size: 16px; font-weight: 900; color: #fff; cursor: pointer; }
        .btn-bet { background: var(--win); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: #1b1c21; width: 90%; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box" id="login-form">
        <h2>AVIATOR LOGIN</h2>
        <input type="email" id="l-email" class="auth-input" placeholder="Email">
        <input type="password" id="l-pass" class="auth-input" placeholder="Password">
        <button onclick="login()" class="auth-btn">LOGIN</button>
        <span class="toggle-link" onclick="toggleAuth()">New User? Create Account</span>
    </div>
    <div class="auth-box" id="signup-form" style="display:none;">
        <h2>CREATE ACCOUNT</h2>
        <input type="email" id="s-email" class="auth-input" placeholder="Email">
        <input type="password" id="s-pass" class="auth-input" placeholder="Password">
        <button onclick="signup()" class="auth-btn">REGISTER</button>
        <span class="toggle-link" onclick="toggleAuth()">Already have account? Login</span>
    </div>
</div>

<div id="game-screen">
    <div class="header">
        <button onclick="openM()" style="background:var(--blue); border:none; padding:5px 15px; border-radius:10px; color:#fff;">PROFILE</button>
        <div class="bal-box">Rs <span id="pBal">0.00</span></div>
        <button onclick="logout()" style="background:grey; border:none; padding:5px 10px; border-radius:10px; color:#fff;">LOGOUT</button>
    </div>
    <div class="arena">
        <div id="mVal">1.00x</div>
        <canvas id="canvas" style="width:100%; height:100%;"></canvas>
    </div>
    <div style="padding:10px;">
        <input type="number" id="amt" value="100" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333; border-radius:10px;">
        <button class="main-btn btn-bet">BET</button>
    </div>
</div>

<div id="uMod" class="modal">
    <div class="m-content">
        <h3>User Profile</h3>
        <p id="uDetails">Loading...</p>
        <button onclick="closeM()" class="auth-btn">CLOSE</button>
    </div>
</div>

<script>
// Firebase Config (Must match your Admin Panel)
const firebaseConfig = { 
    apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", 
    databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// Auth Logic
function toggleAuth() {
    const l = document.getElementById('login-form'), s = document.getElementById('signup-form');
    l.style.display = l.style.display === 'none' ? 'block' : 'none';
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

function signup() {
    const e = document.getElementById('s-email').value, p = document.getElementById('s-pass').value;
    auth.createUserWithEmailAndPassword(e, p).then(res => {
        db.ref('users/' + res.user.uid).set({ email: e, balance: 0, wager: 0 });
        alert("Account Created!");
    }).catch(err => alert(err.message));
}

function login() {
    const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}

function logout() { auth.signOut(); location.reload(); }

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        loadData(user.uid);
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
    }
});

function loadData(uid) {
    db.ref('users/' + uid).on('value', s => {
        const d = s.val();
        if(d) {
            document.getElementById('pBal').innerText = d.balance.toFixed(2);
            document.getElementById('uDetails').innerHTML = `Email: ${d.email}<br>Balance: Rs ${d.balance}<br>Wager: ${d.wager}`;
        }
    });
}

function openM() { document.getElementById('uMod').style.display = 'flex'; }
function closeM() { document.getElementById('uMod').style.display = 'none'; }
</script>
</body>
</html>
