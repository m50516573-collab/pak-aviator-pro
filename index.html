<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Royal VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-red: #ea0606; --bg-dark: #12131a; --panel-bg: #1e1f26; --green-win: #28a745; --purp: #9139ff; --pink: #f141fb; --blue: #34b4ff; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; overflow-y: auto; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: var(--main-red); border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Game UI */
        #aviator-app { display: none; max-width: 450px; margin: auto; background: var(--bg-dark); min-height: 100vh; position: relative; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #222; }
        .balance-box { border: 1.5px solid var(--green-win); border-radius: 20px; padding: 3px 12px; color: var(--green-win); font-weight: 800; font-size: 14px; }
        
        .history-bar { display: flex; gap: 6px; padding: 8px; background: #050505; overflow-x: auto; min-height: 35px; border-bottom: 1px solid #222; }
        .h-item { padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 900; background: var(--blue); }

        .game-arena { height: 240px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #mValue { font-size: 55px; font-weight: 900; z-index: 10; font-style: italic; }
        #plane { position: absolute; font-size: 50px; bottom: 15%; left: 10%; z-index: 5; display: none; filter: drop-shadow(0 0 10px var(--main-red)); }

        /* Two Betting Controls */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: var(--panel-bg); }
        .bet-box { background: #14151b; padding: 10px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .bet-input { width: 80%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 8px; text-align: center; font-size: 16px; margin-bottom: 8px; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; color: white; cursor: pointer; background: var(--green-win); }

        /* Stats & Live Bets */
        .stats-section { background: #0a0a0a; padding: 10px; min-height: 200px; }
        .bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
        .win-txt { color: var(--green-win); font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box" id="login-form">
        <h2 style="color:var(--main-red); margin-bottom:15px;">AVIATOR LOGIN</h2>
        <input type="email" id="l-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="l-pass" class="auth-input" placeholder="Password">
        <button onclick="loginUser()" class="auth-btn">LOGIN</button>
        <p onclick="toggleAuth()" style="color:var(--blue); margin-top:15px; cursor:pointer; font-size:13px;">New Player? Register Here</p>
    </div>
    <div class="auth-box" id="signup-form" style="display:none;">
        <h2 style="color:var(--green-win); margin-bottom:15px;">JOIN ROYAL VIP</h2>
        <input type="email" id="s-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="s-pass" class="auth-input" placeholder="Create Password">
        <button onclick="registerUser()" class="auth-btn" style="background:var(--green-win)">CREATE ACCOUNT</button>
        <p onclick="toggleAuth()" style="color:var(--blue); margin-top:15px; cursor:pointer; font-size:13px;">Already a member? Login</p>
    </div>
</div>

<div id="aviator-app">
    <div class="header">
        <div>
            <div id="uName" style="font-size:10px; color:var(--blue); font-weight:bold;">VIP PLAYER</div>
            <div class="balance-box">Rs <span id="uBalDisplay">0.00</span></div>
        </div>
        <div>
            <button onclick="logoutUser()" style="background:#444; border:none; color:white; padding:5px 10px; border-radius:5px; font-size:11px;">LOGOUT</button>
        </div>
    </div>

    <div class="history-bar" id="hBar"></div>

    <div class="game-arena">
        <div id="mValue">1.00x</div>
        <div id="plane">✈️</div>
    </div>

    <div class="controls-grid">
        <div class="bet-box">
            <input type="number" id="amt1" value="100" class="bet-input">
            <button id="btn1" onclick="handleBet(1)" class="action-btn">BET</button>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100" class="bet-input">
            <button id="btn2" onclick="handleBet(2)" class="action-btn">BET</button>
        </div>
    </div>

    <div class="stats-section">
        <div style="display:flex; justify-content:space-between; color:#666; font-size:11px; padding:5px;">
            <span>USER</span><span>BET</span><span>CASH OUT</span>
        </div>
        <div id="liveBets"></div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database();

let userUID, userBalance = 0, currentMult = 1.0, isGameActive = false;
let activeBets = { 1: { placed: false, amount: 0 }, 2: { placed: false, amount: 0 } };

// Authentication Logic
function toggleAuth() {
    const l = document.getElementById('login-form'), s = document.getElementById('signup-form');
    l.style.display = l.style.display === 'none' ? 'block' : 'none';
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

function registerUser() {
    const e = document.getElementById('s-email').value, p = document.getElementById('s-pass').value;
    auth.createUserWithEmailAndPassword(e, p).then(res => {
        db.ref('users/' + res.user.uid).set({ email: e, balance: 500 });
        alert("Account Created! 500 Bonus added.");
    }).catch(err => alert(err.message));
}

function loginUser() {
    const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}

function logoutUser() { auth.signOut(); location.reload(); }

auth.onAuthStateChanged(user => {
    if(user) {
        userUID = user.uid;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('aviator-app').style.display = 'block';
        db.ref('users/' + userUID).on('value', s => {
            userBalance = s.val().balance;
            document.getElementById('uBalDisplay').innerText = userBalance.toFixed(2);
        });
        runGameEngine();
    }
});

// Game Engine
function runGameEngine() {
    isGameActive = true;
    currentMult = 1.0;
    document.getElementById('plane').style.display = 'block';
    document.getElementById('liveBets').innerHTML = '';

    const gameLoop = setInterval(() => {
        if(!isGameActive) { clearInterval(gameLoop); return; }
        currentMult += 0.01;
        document.getElementById('mValue').innerText = currentMult.toFixed(2) + "x";
        
        // Random fake bets
        if(Math.random() > 0.8) {
            const row = document.createElement('div');
            row.className = "bet-row";
            row.innerHTML = `<span>User_${Math.floor(Math.random()*999)}</span><span>Rs ${Math.floor(Math.random()*500)}</span><span class="win-txt">${currentMult.toFixed(2)}x</span>`;
            document.getElementById('liveBets').prepend(row);
        }

        // Random Crash Logic
        if(currentMult > (1.2 + Math.random()*15)) {
            isGameActive = false;
            document.getElementById('mValue').innerText = "FLEW AWAY!";
            document.getElementById('mValue').style.color = "red";
            document.getElementById('plane').style.display = 'none';
            resetBets();
            setTimeout(runGameEngine, 4000);
        }
    }, 100);
}

function handleBet(id) {
    const btn = document.getElementById('btn' + id);
    const amt = parseFloat(document.getElementById('amt' + id).value);

    if(!activeBets[id].placed) {
        if(amt > userBalance) return alert("Low Balance!");
        db.ref('users/' + userUID).update({ balance: userBalance - amt });
        activeBets[id].placed = true;
        activeBets[id].amount = amt;
        btn.innerText = "CASH OUT";
        btn.style.background = "orange";
    } else {
        const win = activeBets[id].amount * currentMult;
        db.ref('users/' + userUID).update({ balance: userBalance + win });
        activeBets[id].placed = false;
        btn.innerText = "BET";
        btn.style.background = "var(--green-win)";
        alert("Success! Won: Rs " + win.toFixed(2));
    }
}

function resetBets() {
    [1, 2].forEach(id => {
        activeBets[id].placed = false;
        const btn = document.getElementById('btn' + id);
        btn.innerText = "BET";
        btn.style.background = "var(--green-win)";
    });
}
</script>
</body>
</html>
