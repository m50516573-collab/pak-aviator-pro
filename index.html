<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator VIP - Muhammad Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ea0606; --bg: #12131a; --card: #1e1f26; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        #app { max-width: 450px; margin: auto; background: var(--bg); min-height: 100vh; position: relative; display: none; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 85%; text-align: center; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .auth-input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #000; border: 1px solid #444; color: #fff; font-size: 14px; }
        .auth-btn { width: 100%; padding: 14px; background: var(--red); border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .auth-toggle { font-size: 12px; color: #888; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        .header { display: flex; justify-content: space-between; padding: 12px 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #333; gap: 8px; }
        .u-info { font-size: 10px; color: var(--blue); flex: 1; min-width: 80px; text-overflow: ellipsis; overflow: hidden; }
        .bal-box { border: 1.5px solid var(--win); border-radius: 20px; padding: 4px 10px; color: var(--win); font-weight: 800; font-size: 13px; background: rgba(0,0,0,0.3); text-align: center; min-width: 85px; }
        .nav-btns { display: flex; gap: 6px; }
        .nav-btns button { padding: 8px 10px; border-radius: 6px; border: none; font-size: 10px; font-weight: bold; color: white; cursor: pointer; }

        .history-bar { display: flex; gap: 5px; padding: 8px; background: #050505; overflow-x: auto; height: 35px; scrollbar-width: none; }
        .h-tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; background: #222; border: 1px solid #444; height: fit-content; flex-shrink: 0; }
        .h-high { color: #9c27b0; border-color: #9c27b0; }
        .h-mid { color: var(--blue); border-color: var(--blue); }

        .arena { height: 220px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #mVal { font-size: 50px; font-weight: 900; z-index: 10; transition: color 0.2s; }
        #plane { position: absolute; font-size: 45px; bottom: 15%; left: 10%; z-index: 5; display: none; filter: drop-shadow(0 0 10px red); }
        #tBox { position: absolute; background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 50px; border: 2px solid var(--win); color: var(--win); font-weight: bold; z-index: 20; display: none; }

        #win-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(40, 167, 69, 0.95); padding: 15px 30px; border-radius: 50px; border: 2px solid #fff; box-shadow: 0 0 20px #28a745; z-index: 100; display: none; text-align: center; min-width: 150px; pointer-events: none; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: var(--card); }
        .bet-box { background: #14151b; padding: 10px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .b-input { width: 90%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 8px; text-align: center; margin-bottom: 5px; font-size: 14px; }
        .b-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 900; color: white; cursor: pointer; background: var(--win); }
        .auto-label { font-size: 10px; color: #888; display: block; margin-top: 5px; }

        .live-stats { background: #1b1c21; padding: 5px 15px; display: flex; justify-content: space-between; font-size: 11px; }
        .winners-list { background: #0a0a0a; padding: 10px; min-height: 250px; font-size: 11px; height: 250px; overflow-y: auto; }
        .win-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        .close-btn { float: right; font-size: 24px; cursor: pointer; color: var(--red); }
        .inst-box { background:#111; padding:15px; border-radius:10px; font-size:12px; border-left:4px solid var(--gold); margin-bottom:15px; line-height:1.5; }
        
        .status-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #444; font-size: 12px; }
        .status-pending { border-color: var(--gold); color: var(--gold); }
        .status-approved { border-color: var(--win); color: var(--win); }

        #bonus-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: #1e1f26; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; z-index: 5000; text-align: center; box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title" style="color:var(--red); margin-top:0;">AVIATOR LOGIN</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Enter Email">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Enter Password">
        <button id="auth-main-btn" onclick="handleAuth()" class="auth-btn">LOGIN</button>
        <p id="auth-toggle-text" class="auth-toggle" onclick="toggleAuthMode()">Don't have an account? Sign Up</p>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="u-info"><span id="uGmail">...</span><br><button onclick="toggleTab('profileTab')" style="background:none; border:none; color:var(--blue); font-size:10px; padding:0; cursor:pointer;">MY PROFILE 👤</button></div>
        <div class="bal-box">Rs <span id="uBal">0.00</span></div>
        <div class="nav-btns">
            <button onclick="toggleTab('depTab')" style="background:var(--win);">DEPOSIT</button>
            <button onclick="toggleTab('witTab')" style="background:var(--blue);">WITHDRAW</button>
        </div>
    </div>

    <div class="history-bar" id="hBar"></div>
    <div class="arena">
        <div id="tBox">Next Round: 7s</div>
        <div id="mVal">WAITING</div>
        <div id="plane">✈️</div>
        <div id="win-pop">
            <div style="font-size:12px; color:white;">YOU CASHED OUT!</div>
            <div id="pop-win-val" style="font-size:22px; font-weight:bold; color:white;">0.00x</div>
        </div>
    </div>

    <div class="live-stats"><span>ALL BETS</span><span style="color:var(--win); font-weight:bold;">● <span id="pCount">1245</span></span></div>

    <div class="controls-grid">
        <div class="bet-box">
            <input type="number" id="amt1" value="100" class="b-input">
            <input type="number" id="autoX1" placeholder="Auto Cash" class="b-input">
            <button id="btn1" onclick="handleBet(1)" class="b-btn">BET</button>
            <label class="auto-label"><input type="checkbox" id="auto1"> Auto Bet</label>
        </div>
        <div class="bet-box">
            <input type="number" id="amt2" value="100" class="b-input">
            <input type="number" id="autoX2" placeholder="Auto Cash" class="b-input">
            <button id="btn2" onclick="handleBet(2)" class="b-btn">BET</button>
            <label class="auto-label"><input type="checkbox" id="auto2"> Auto Bet</label>
        </div>
    </div>
    <div class="winners-list" id="winRows"></div>

    <div id="depTab" class="overlay"><span class="close-btn" onclick="toggleTab()">×</span><h3 style="color:var(--gold); text-align:center;">DEPOSIT</h3><div class="inst-box"><b>NAME: MUHAMMAD SHOP</b><br><b>TILL ID: 983199695</b></div><input type="number" id="dAmt" placeholder="Amount" class="b-input" style="width:100%;"><input type="text" id="dTid" placeholder="TID" class="b-input" style="width:100%;"><button onclick="submitDep()" class="b-btn" style="width:100%">SUBMIT</button></div>
    <div id="witTab" class="overlay"><span class="close-btn" onclick="toggleTab()">×</span><h3 style="color:var(--blue); text-align:center;">WITHDRAW</h3><input type="number" id="wAmt" placeholder="Amount" class="b-input" style="width:100%;"><input type="text" id="wNum" placeholder="Number" class="b-input" style="width:100%;"><button onclick="submitWit()" class="b-btn" style="width:100%; background:var(--blue)">WITHDRAW</button></div>
    <div id="profileTab" class="overlay"><span class="close-btn" onclick="toggleTab()">×</span><h3>MY PROFILE</h3><div id="profData" style="background:#1b1c21; padding:15px; border-radius:10px;"></div><button onclick="auth.signOut()" class="auth-btn">LOGOUT</button><h4>HISTORY</h4><div id="uStatusList"></div></div>
</div>

<script>
const conf = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const auth = firebase.auth(), db = firebase.database();
const cashoutSound = new Audio('https://files.catbox.moe/v6p5at.mp3');

let uid, userEmail, balance = 0, wager = 0, mult = 1.0, isFlying = false, isWaiting = true, currentPlayers = 1245;
let b1 = { active: false, amt: 0, cashed: false }, b2 = { active: false, amt: 0, cashed: false };
let isLoginMode = true, houseEdge = 0.016;

const pakNames = ["ali", "khan", "hamza", "ahmed", "waseem", "malik", "rana", "jutt", "asif", "bilal", "umer", "hadi", "shah"];
const pakAmts = [100, 200, 500, 1000, 2500, 5000];

function toggleAuthMode() { isLoginMode = !isLoginMode; document.getElementById('auth-title').innerText = isLoginMode ? "AVIATOR LOGIN" : "AVIATOR SIGNUP"; }

function handleAuth() {
    const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
    if(isLoginMode) auth.signInWithEmailAndPassword(e, p).catch(a => alert(a.message));
    else auth.createUserWithEmailAndPassword(e, p).then(res => db.ref('users/' + res.user.uid).set({email: e, balance: 100, wager: 0})).catch(a => alert(a.message));
}

auth.onAuthStateChanged(user => {
    if(user) {
        uid = user.uid; userEmail = user.email;
        document.getElementById('uGmail').innerText = userEmail;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        db.ref('users/' + uid).on('value', s => { 
            if(s.exists()){ 
                balance = s.val().balance || 0; wager = s.val().wager || 0; 
                document.getElementById('uBal').innerText = balance.toFixed(2);
                document.getElementById('profData').innerHTML = `<b>Email:</b> ${userEmail}<br><b>Wager:</b> Rs ${wager.toFixed(0)} / 5000`;
            }
        });
        generateFakeHistory(); start7sTimer(); startFakeWinners();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

function start7sTimer() {
    let t = 7; isWaiting = true; isFlying = false;
    currentPlayers = Math.floor(Math.random() * 300) + 1100;
    document.getElementById('pCount').innerText = currentPlayers;
    document.getElementById('tBox').style.display = 'block';
    document.getElementById('plane').style.display = 'none';
    document.getElementById('mVal').innerText = "WAITING";
    document.getElementById('mVal').style.color = "white";
    let itv = setInterval(() => {
        document.getElementById('tBox').innerText = `Next Round: ${t}s`;
        if(t <= 0) { clearInterval(itv); document.getElementById('tBox').style.display = 'none'; launchPlane(); }
        t--;
    }, 1000);
}

function launchPlane() {
    isWaiting = false; isFlying = true; mult = 1.0;
    document.getElementById('plane').style.display = 'block';
    [1, 2].forEach(id => {
        if((id===1?b1:b2).active) { 
            document.getElementById('btn'+id).style.background = "linear-gradient(#f2a900, #b8860b)";
            document.getElementById('btn'+id).innerText = "CASH OUT";
        }
    });

    function move() {
        if(!isFlying) return;
        mult += 0.01;
        document.getElementById('mVal').innerText = mult.toFixed(2) + "x";
        if(Math.random() < 0.4 && currentPlayers > 20) {
            currentPlayers -= Math.floor(Math.random() * 10) + 5;
            document.getElementById('pCount').innerText = currentPlayers;
        }
        [1, 2].forEach(id => {
            let b = id === 1 ? b1 : b2;
            if(b.active && !b.cashed) {
                document.getElementById('btn'+id).innerText = "CASH OUT\nRs " + (b.amt * mult).toFixed(2);
                if(parseFloat(document.getElementById('autoX'+id).value) <= mult) handleBet(id);
            }
        });
        document.getElementById('plane').style.left = (10 + (mult * 2)) + "%";
        document.getElementById('plane').style.bottom = (15 + (mult * 1.5)) + "%";
        if(Math.random() < houseEdge) crash(); else setTimeout(move, 100);
    }
    move();
}

function crash() {
    isFlying = false; document.getElementById('mVal').innerText = "FLEW AWAY!";
    document.getElementById('mVal').style.color = "red";
    document.getElementById('plane').style.display = 'none';
    addHistoryTag(mult.toFixed(2));
    [1, 2].forEach(id => {
        let b = id === 1 ? b1 : b2; b.active = false; b.cashed = false;
        document.getElementById('btn'+id).innerText = "BET"; document.getElementById('btn'+id).style.background = "#28a745";
    });
    setTimeout(start7sTimer, 3000);
}

function handleBet(id) {
    let b = id === 1 ? b1 : b2; const btn = document.getElementById('btn' + id);
    const amt = parseFloat(document.getElementById('amt' + id).value);
    if(isWaiting && !b.active) {
        if(amt > balance) return alert("Low Bal");
        db.ref('users/'+uid).update({balance: balance - amt, wager: wager + amt});
        b.active = true; b.amt = amt; btn.innerText = "CANCEL"; btn.style.background = "#991b1b";
    } else if(isFlying && b.active && !b.cashed) {
        let win = b.amt * mult; db.ref('users/'+uid).update({balance: balance + win});
        b.cashed = true; btn.innerText = "WON Rs " + win.toFixed(0); btn.style.background = "#155724";
        try { cashoutSound.play(); } catch(e){}
        document.getElementById('pop-win-val').innerText = mult.toFixed(2) + "x";
        document.getElementById('win-pop').style.display = 'block';
        setTimeout(() => document.getElementById('win-pop').style.display = 'none', 2000);
        addWinRow("YOU", b.amt, mult.toFixed(2));
    }
}

function startFakeWinners() {
    setInterval(() => {
        if(isFlying && Math.random() < 0.8) {
            let name = pakNames[Math.floor(Math.random()*pakNames.length)];
            let fakeGmail = `${name}${Math.floor(Math.random()*999)}...@gmail.com`;
            let fAmt = pakAmts[Math.floor(Math.random()*pakAmts.length)];
            addWinRow(fakeGmail, fAmt, (Math.random()*(mult-1.1)+1.1).toFixed(2));
        }
    }, 600);
}

function addWinRow(u, b, x) {
    const row = document.createElement('div'); row.className = 'win-row';
    row.innerHTML = `<span>${u}</span><span>Rs ${b}</span><span style="color:var(--win)">${x}x</span>`;
    const list = document.getElementById('winRows'); list.prepend(row);
    if(list.children.length > 40) list.lastChild.remove();
}

function addHistoryTag(val) {
    const tag = document.createElement('div'); tag.className = 'h-tag ' + (val >= 2 ? 'h-mid' : '');
    tag.innerText = val + 'x'; document.getElementById('hBar').prepend(tag);
}

function generateFakeHistory() { for(let i=0; i<15; i++) addHistoryTag((Math.random()*3 + 1).toFixed(2)); }
function toggleTab(id) { document.querySelectorAll('.overlay').forEach(t => t.style.display = 'none'); if(id) document.getElementById(id).style.display = 'block'; if(id==='profileTab') loadStatusHistory(); }

function loadStatusHistory() {
    db.ref('requests').orderByChild('uid').equalTo(uid).limitToLast(5).on('value', s => {
        let h = ""; s.forEach(c => { h = `<div class="status-item status-${c.val().status}"><b>${c.val().type}</b>: Rs ${c.val().amount}</div>` + h; });
        document.getElementById('uStatusList').innerHTML = h || "No data";
    });
}

function submitDep() { 
    const a = document.getElementById('dAmt').value, t = document.getElementById('dTid').value;
    if(a && t) { db.ref('requests').push({uid, email: userEmail, amount: a, tid: t, type: 'deposit', status: 'pending'}); alert("Sent!"); toggleTab(); }
}
function submitWit() {
    const a = document.getElementById('wAmt').value, n = document.getElementById('wNum').value;
    if(a >= 500 && wager >= 5000 && a <= balance) {
        db.ref('requests').push({uid, email: userEmail, amount: a, number: n, type: 'withdraw', status: 'pending'});
        db.ref('users/'+uid).update({balance: balance - a}); alert("Sent!"); toggleTab();
    } else alert("Error");
}
</script>
</body>
        </html>
