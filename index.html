<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Royal VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-red: #ea0606; --bg-dark: #12131a; --panel-bg: #1e1f26; --green-win: #28a745; --purp: #9139ff; --pink: #f141fb; --blue: #34b4ff; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; overflow-y: auto; }
        
        /* Auth Screen - Login se pehle ye dikhega */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: var(--main-red); border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Main App Layout */
        #aviator-app { display: none; max-width: 450px; margin: auto; background: var(--bg-dark); min-height: 100vh; position: relative; border: 1px solid #333; }
        
        .header { display: flex; justify-content: space-between; padding: 10px; background: #1b1c21; align-items: center; border-bottom: 1px solid #222; }
        .balance-box { border: 1.5px solid var(--green-win); border-radius: 20px; padding: 3px 12px; color: var(--green-win); font-weight: 800; font-size: 14px; }
        .nav-btns button { background: var(--green-win); color: white; border: none; padding: 6px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* History & Arena */
        .history-bar { display: flex; gap: 6px; padding: 8px; background: #050505; overflow-x: auto; min-height: 30px; border-bottom: 1px solid #222; }
        .h-item { padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 900; background: var(--blue); min-width: 45px; text-align: center; }
        
        .game-arena { height: 240px; background: radial-gradient(circle at bottom left, #1c1d21, #000); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #mValue { font-size: 55px; font-weight: 900; z-index: 10; font-style: italic; }
        #plane { position: absolute; font-size: 50px; bottom: 15%; left: 10%; z-index: 5; display: none; filter: drop-shadow(0 0 10px var(--main-red)); }

        /* Deposit/Withdraw Tabs */
        .form-tab { display: none; position: absolute; top: 60px; left: 10px; right: 10px; background: #2c2d33; padding: 15px; border-radius: 12px; border: 1px solid #444; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .form-tab input { width: calc(100% - 24px); background: #12131a; border: 1px solid #555; color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: block; }

        /* Controls */
        .controls { padding: 12px; background: var(--panel-bg); display: flex; flex-direction: column; gap: 10px; }
        .bet-input-box { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; text-align: center; font-size: 18px; }
        .bet-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 20px; font-weight: 900; color: white; cursor: pointer; background: var(--green-win); }

        /* Stats List */
        .stats-box { background:#0a0a0a; font-size:11px; min-height: 200px; padding: 10px; }
        .bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box" id="login-form">
        <h2 style="color:var(--main-red)">AVIATOR LOGIN</h2>
        <input type="email" id="l-email" class="auth-input" placeholder="Email">
        <input type="password" id="l-pass" class="auth-input" placeholder="Password">
        <button onclick="login()" class="auth-btn">LOGIN</button>
        <p onclick="toggleAuth()" style="color:var(--blue); cursor:pointer; margin-top:15px; font-size:13px;">Create New Account</p>
    </div>
    <div class="auth-box" id="signup-form" style="display:none;">
        <h2 style="color:var(--green-win)">REGISTER</h2>
        <input type="email" id="s-email" class="auth-input" placeholder="Email">
        <input type="password" id="s-pass" class="auth-input" placeholder="Password">
        <button onclick="signup()" class="auth-btn" style="background:var(--green-win)">REGISTER</button>
        <p onclick="toggleAuth()" style="color:var(--blue); cursor:pointer; margin-top:15px; font-size:13px;">Back to Login</p>
    </div>
</div>

<div id="aviator-app">
    <div class="header">
        <div>
            <div id="uName" style="font-size:10px; color:var(--blue); font-weight:bold;">VIP PLAYER</div>
            <div class="balance-box">Rs <span id="uBal">0.00</span></div>
        </div>
        <div class="nav-btns">
            <button onclick="toggleTab('depForm')">DEPOSIT</button>
            <button onclick="toggleTab('witForm')" style="background:#007bff; margin-left:5px;">WITHDRAW</button>
        </div>
    </div>

    <div id="depForm" class="form-tab">
        <h4 style="color:var(--green-win)">Deposit (Easypaisa/JazzCash)</h4>
        <p style="font-size:12px; color:#ccc;">Send to: 03442738189 (M. Waseem)</p>
        <input type="number" id="dAmt" placeholder="Amount">
        <input type="text" id="dTid" placeholder="Transaction ID">
        <button onclick="submitDep()" style="width:100%; padding:10px; background:var(--green-win); border:none; border-radius:5px; color:white; font-weight:bold;">SUBMIT</button>
        <button onclick="toggleTab()" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Close</button>
    </div>

    <div id="witForm" class="form-tab">
        <h4 style="color:#007bff">Withdraw Request</h4>
        <input type="number" id="wAmt" placeholder="Amount">
        <input type="text" id="wBank" placeholder="Method (EP/JC)">
        <input type="text" id="wNum" placeholder="Account Number">
        <button onclick="submitWit()" style="width:100%; padding:10px; background:#007bff; border:none; border-radius:5px; color:white; font-weight:bold;">REQUEST</button>
        <button onclick="toggleTab()" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Close</button>
    </div>

    <div class="history-bar" id="hBar"></div>

    <div class="game-arena">
        <div id="mValue">1.00x</div>
        <div id="plane">✈️</div>
    </div>

    <div class="controls">
        <input type="number" id="bAmt" value="100" class="bet-input-box">
        <button id="betBtn" class="bet-btn" onclick="placeBet()">BET</button>
        <button id="cashBtn" class="bet-btn" style="display:none; background:#ffc107; color:black;" onclick="doCashout()">CASH OUT</button>
    </div>

    <div class="stats-box">
        <div id="betsList"></div>
    </div>
</div>

<script>
const conf = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const auth = firebase.auth(), db = firebase.database();
let uid, balance = 0, mult = 1.0, active = false, betPlaced = false;

// Auth Logic
function toggleAuth() {
    const l = document.getElementById('login-form'), s = document.getElementById('signup-form');
    l.style.display = l.style.display === 'none' ? 'block' : 'none';
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

function signup() {
    const e = document.getElementById('s-email').value, p = document.getElementById('s-pass').value;
    auth.createUserWithEmailAndPassword(e, p).then(res => {
        db.ref('users/' + res.user.uid).set({ email: e, balance: 500 });
        alert("Success! 500 Bonus added.");
    }).catch(err => alert(err.message));
}

function login() {
    const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}

auth.onAuthStateChanged(user => {
    if(user) {
        uid = user.uid;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('aviator-app').style.display = 'block';
        db.ref('users/' + uid).on('value', s => {
            balance = s.val().balance;
            document.getElementById('uBal').innerText = balance.toFixed(2);
        });
        startEngine();
    }
});

// Game Logic
function startEngine() {
    mult = 1.0; active = true;
    document.getElementById('plane').style.display = 'block';
    const loop = setInterval(() => {
        if(!active) { clearInterval(loop); return; }
        mult += 0.01;
        document.getElementById('mValue').innerText = mult.toFixed(2) + "x";
        if(mult > (1.1 + Math.random()*10)) { crash(); }
    }, 100);
}

function crash() {
    active = false; betPlaced = false;
    document.getElementById('mValue').innerText = "FLEW AWAY!";
    document.getElementById('plane').style.display = 'none';
    document.getElementById('cashBtn').style.display = 'none';
    document.getElementById('betBtn').style.display = 'block';
    setTimeout(startEngine, 3000);
}

function placeBet() {
    let a = parseInt(document.getElementById('bAmt').value);
    if(a > balance) return alert("Low Balance");
    db.ref('users/'+uid).update({balance: balance - a});
    betPlaced = true;
    document.getElementById('betBtn').style.display = 'none';
    document.getElementById('cashBtn').style.display = 'block';
}

function doCashout() {
    if(!active || !betPlaced) return;
    let win = parseInt(document.getElementById('bAmt').value) * mult;
    db.ref('users/'+uid).update({balance: balance + win});
    document.getElementById('cashBtn').style.display = 'none';
    document.getElementById('betBtn').style.display = 'block';
    betPlaced = false;
    alert("Won: " + win.toFixed(2));
}

function toggleTab(id) {
    document.getElementById('depForm').style.display = 'none';
    document.getElementById('witForm').style.display = 'none';
    if(id) document.getElementById(id).style.display = 'block';
}

function submitDep() {
    const a = document.getElementById('dAmt').value, t = document.getElementById('dTid').value;
    if(!a || !t) return;
    db.ref('requests').push({uid, amount: a, tid: t, type: 'deposit', status: 'pending'});
    alert("Request Sent!"); toggleTab();
}
</script>
</body>
    </html>
